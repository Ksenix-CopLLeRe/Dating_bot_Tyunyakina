services:
  postgres:
    image: postgres:16
    container_name: isolation-practice-postgres
    environment:
      POSTGRES_DB: isolation_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  mysql:
    image: mysql:8.4
    container_name: isolation-practice-mysql
    environment:
      MYSQL_DATABASE: isolation_practice
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  pgdata:
  mysqldata:
