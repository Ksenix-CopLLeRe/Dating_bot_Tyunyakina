version: "3.9"

services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: dating_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    depends_on:
      - backend
    env_file:
      - .env